name: Deploy

on:
  push:
    tags:
      - 'v*-cobble'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    name: Publish @jameymcelveen/cobble to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
